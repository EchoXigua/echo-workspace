server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: leanmate-server
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/leanmate}
    username: ${DB_USERNAME:leanmate}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
  jpa:
    open-in-view: false
    show-sql: ${LOG_SQL:false}
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  servlet:
    multipart:
      max-file-size: ${MAX_UPLOAD_IMAGE_SIZE_MB:8}MB
      max-request-size: ${MAX_UPLOAD_IMAGE_SIZE_MB:8}MB

logging:
  level:
    root: ${LOG_LEVEL:INFO}

leanmate:
  env: ${APP_ENV:local}
  public-base-url: ${APP_PUBLIC_BASE_URL:http://localhost:8080}
  jwt:
    issuer: ${JWT_ISSUER:leanmate}
    secret: ${JWT_SECRET:change-me-use-a-strong-secret}
    access-token-ttl-seconds: ${JWT_ACCESS_TOKEN_TTL_SECONDS:3600}
    refresh-token-ttl-days: ${JWT_REFRESH_TOKEN_TTL_DAYS:30}
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:*}
    allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
    allowed-headers: ${CORS_ALLOWED_HEADERS:Authorization,Content-Type,Accept,Origin}
    allow-credentials: ${CORS_ALLOW_CREDENTIALS:false}
    max-age-seconds: ${CORS_MAX_AGE_SECONDS:3600}
  apple:
    client-id: ${APPLE_CLIENT_ID:}
    team-id: ${APPLE_TEAM_ID:}
    key-id: ${APPLE_KEY_ID:}
    private-key: ${APPLE_PRIVATE_KEY:}
  storage:
    provider: ${STORAGE_PROVIDER:s3}
    endpoint: ${STORAGE_ENDPOINT:}
    bucket: ${STORAGE_BUCKET:}
    access-key: ${STORAGE_ACCESS_KEY:}
    secret-key: ${STORAGE_SECRET_KEY:}
    public-base-url: ${STORAGE_PUBLIC_BASE_URL:}
  ai:
    provider: ${AI_PROVIDER:placeholder}
    api-key: ${AI_API_KEY:}
    base-url: ${AI_BASE_URL:}
    diet-photo-provider: ${AI_DIET_PHOTO_PROVIDER:${AI_PROVIDER:placeholder}}
    diet-text-provider: ${AI_DIET_TEXT_PROVIDER:${AI_PROVIDER:placeholder}}
    daily-report-provider: ${AI_DAILY_REPORT_PROVIDER:${AI_PROVIDER:placeholder}}
    diet-photo-model: ${AI_DIET_PHOTO_MODEL:change-me}
    diet-text-model: ${AI_DIET_TEXT_MODEL:change-me}
    daily-report-model: ${AI_DAILY_REPORT_MODEL:change-me}
    deepseek-api-key: ${DEEPSEEK_API_KEY:${AI_API_KEY:}}
    deepseek-base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
    request-timeout-seconds: ${AI_REQUEST_TIMEOUT_SECONDS:30}
    daily-report-retry-limit: ${AI_DAILY_REPORT_RETRY_LIMIT:1}
  limits:
    max-upload-image-size-mb: ${MAX_UPLOAD_IMAGE_SIZE_MB:8}
    daily-ai-recognition-limit: ${DAILY_AI_RECOGNITION_LIMIT:30}
    daily-report-generate-limit: ${DAILY_REPORT_GENERATE_LIMIT:3}
  observability:
    access-log-enabled: ${ACCESS_LOG_ENABLED:true}
    access-log-include-query-keys: ${ACCESS_LOG_INCLUDE_QUERY_KEYS:true}
    access-log-slow-threshold-ms: ${ACCESS_LOG_SLOW_THRESHOLD_MS:1000}
    ai-call-log-enabled: ${AI_CALL_LOG_ENABLED:true}
    ai-call-log-save-debug-payload: ${AI_CALL_LOG_SAVE_DEBUG_PAYLOAD:false}
  food-catalog:
    seed:
      enabled: ${FOOD_CATALOG_SEED_ENABLED:true}
      location: ${FOOD_CATALOG_SEED_LOCATION:classpath:db/seed/food-catalog}
