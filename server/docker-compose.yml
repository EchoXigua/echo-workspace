services:
  postgres:
    image: postgres:16-alpine
    container_name: leanmate-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-leanmate}
      POSTGRES_USER: ${POSTGRES_USER:-leanmate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-leanmate_local_password}
      TZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - leanmate_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  leanmate_postgres_data:
