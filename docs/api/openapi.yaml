openapi: 3.0.3
info:
  title: LeanMate API
  version: 0.1.0
  description: |
    LeanMate V1.1 MVP 接口契约，覆盖认证、用户档案、首页统计、饮食记录、体重记录、AI 日报和连续打卡。

    服务端会在每个响应 Header 中返回 `X-Request-Id`，用于客户端反馈问题和服务端日志排查。客户端可以传入合法 `X-Request-Id`，服务端会复用；未传或格式不合法时由服务端生成。
servers:
  - url: https://api.leanmate.app
    description: Production
  - url: https://dev-api.leanmate.app
    description: Development
  - url: http://localhost:8080
    description: Local
security:
  - bearerAuth: []
tags:
  - name: Auth
    description: 登录、刷新令牌、退出登录
  - name: Me
    description: 当前用户
  - name: Profile
    description: 用户档案和目标
  - name: Home
    description: 首页今日状态
  - name: Diet
    description: 饮食识别和饮食记录
  - name: Foods
    description: 本地基础食物库、份量和营养计算
  - name: Weight
    description: 体重记录
  - name: Sync
    description: 游客本地数据统一同步
  - name: Report
    description: AI 日报
  - name: Retention
    description: 连续打卡和里程碑弹窗
  - name: Settings
    description: 用户设置和提醒偏好
paths:
  /v1/auth/oauth-login:
    post:
      tags: [Auth]
      summary: 第三方登录
      description: V1.1 首发真实登录只支持 Apple；local/test 可使用受控 mock verifier。google 枚举仅保留后续扩展，当前返回参数错误。
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OAuthLoginRequest"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiAuthTokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /v1/auth/refresh:
    post:
      tags: [Auth]
      summary: 刷新访问令牌
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiAuthTokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/auth/logout:
    post:
      tags: [Auth]
      summary: 退出登录
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEmptyResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/me:
    get:
      tags: [Me]
      summary: 获取当前用户
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiCurrentUserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/profile:
    get:
      tags: [Profile]
      summary: 获取当前用户档案
      responses:
        "200":
          description: 成功。未完成档案时 data.profile 可为空。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiUserProfileResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      tags: [Profile]
      summary: 创建或更新当前用户档案
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveUserProfileRequest"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiUserProfileResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/profile/calorie-target-suggestion:
    get:
      tags: [Profile]
      summary: 获取热量目标调整建议
      description: 基于最近 14 天体重趋势给出建议，不会自动修改用户当前目标。
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiCalorieTargetSuggestionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/profile/plan-overview:
    get:
      tags: [Profile]
      summary: 获取数据与计划聚合视图
      description: 聚合档案、当前目标、近 30 天体重趋势和热量目标调整建议，用于“数据与计划”首页和详情页。
      responses:
        "200":
          description: 成功。未完成档案时 data.profileCompleted=false，聚合字段可为空。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiPlanOverviewResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/home/today:
    get:
      tags: [Home]
      summary: 获取首页今日状态
      parameters:
        - in: query
          name: date
          schema:
            type: string
            format: date
          description: 业务日期，不传默认用户当前业务日。
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiTodayHomeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/diet/recognitions/photo:
    post:
      tags: [Diet]
      summary: 创建拍照饮食识别任务
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image, mealType]
              properties:
                image:
                  type: string
                  format: binary
                mealType:
                  $ref: "#/components/schemas/MealType"
                mealDate:
                  type: string
                  format: date
                note:
                  type: string
                  maxLength: 500
                  nullable: true
      responses:
        "200":
          description: 成功。任务可能仍在 running，客户端需要支持查询任务。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiRecognitionTaskResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/AiServiceError"
  /v1/diet/recognitions/text:
    post:
      tags: [Diet]
      summary: 创建文本饮食解析任务
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TextRecognitionRequest"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiRecognitionTaskResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/AiServiceError"
  /v1/diet/recognitions/{taskId}:
    get:
      tags: [Diet]
      summary: 查询饮食识别任务
      parameters:
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiRecognitionTaskResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/diet/entries:
    get:
      tags: [Diet]
      summary: 查询饮食记录
      description: 返回指定业务日期下未删除的 confirmed 饮食记录。
      parameters:
        - in: query
          name: date
          required: true
          schema:
            type: string
            format: date
          description: 业务日期。
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiFoodEntryListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Diet]
      summary: 保存饮食记录
      description: 手动记录可直接保存；AI 草稿需用户确认后保存为正式记录。保存成功后返回记录和刷新后的当日统计快照。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveFoodEntryRequest"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiFoodEntrySaveResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/diet/entries/sync-local:
    post:
      tags: [Diet]
      summary: 同步游客本地饮食记录
      description: 用户登录后批量导入游客模式下保存在本地的 confirmed 饮食记录。后端必须按当前用户和 clientLocalId 幂等处理，避免重试造成重复记录。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncLocalDietEntriesRequest"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSyncLocalDietEntriesResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/diet/entries/{entryId}:
    put:
      tags: [Diet]
      summary: 编辑饮食记录
      description: 编辑 confirmed 记录后重新计算营养汇总，并刷新对应日期统计快照。
      parameters:
        - $ref: "#/components/parameters/EntryId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveFoodEntryRequest"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiFoodEntrySaveResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Diet]
      summary: 删除饮食记录
      description: V1.1 使用软删除，并刷新当日统计快照。
      parameters:
        - $ref: "#/components/parameters/EntryId"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEmptyResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/foods/search:
    get:
      tags: [Foods]
      summary: 搜索本地基础食物库
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
          description: 搜索关键词。
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
          description: 返回数量，不传默认 10。
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiFoodSearchResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/foods/{foodId}:
    get:
      tags: [Foods]
      summary: 获取食物详情
      parameters:
        - in: path
          name: foodId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiFoodDetailResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/foods/calculate:
    post:
      tags: [Foods]
      summary: 计算食物营养值
      description: 按 foodId + weightG 或 foodId + portionId 计算营养值。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalculateFoodNutritionRequest"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiFoodNutritionCalculationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/weights:
    get:
      tags: [Weight]
      summary: 查询体重记录
      description: 查询区间最大跨度为 180 天。
      parameters:
        - in: query
          name: startDate
          required: true
          schema:
            type: string
            format: date
        - in: query
          name: endDate
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiWeightEntryListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Weight]
      summary: 保存体重记录
      description: V1.1 同一天同一用户只保留一条记录，重复提交则覆盖；记录日期不能晚于用户本地今天。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveWeightEntryRequest"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiWeightEntrySaveResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/weights/trend:
    get:
      tags: [Weight]
      summary: 获取体重趋势
      description: 返回最近 N 天体重趋势聚合和图表点位。days 不传默认 30，后端限制在 7-180。
      parameters:
        - in: query
          name: days
          required: false
          schema:
            type: integer
            minimum: 7
            maximum: 180
            default: 30
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiWeightTrendResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/sync/local:
    post:
      tags: [Sync]
      summary: 统一同步游客本地数据
      description: 登录后一次性同步游客模式下的身体档案、体重记录和饮食记录；部分失败不影响其他类别。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncLocalRequest"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSyncLocalResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/reports/daily:
    get:
      tags: [Report]
      summary: 获取 AI 日报
      parameters:
        - in: query
          name: date
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: 成功。未生成时报表 data 可为空或 status 为 pending，按实现选择并保持一致。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiDailyReportResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Report]
      summary: 手动触发 AI 日报生成或重试
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateDailyReportRequest"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiDailyReportResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/AiServiceError"
  /v1/reports/daily/{reportId}/view:
    post:
      tags: [Report]
      summary: 标记 AI 日报已查看
      parameters:
        - $ref: "#/components/parameters/ReportId"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiDailyReportResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/retention/streak:
    get:
      tags: [Retention]
      summary: 获取连续打卡状态
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiStreakResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/retention/milestone-notices:
    get:
      tags: [Retention]
      summary: 获取待展示里程碑弹窗
      description: 只返回未关闭的里程碑 notice，客户端展示后调用 dismiss 接口关闭。
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiRetentionNoticeListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/retention/milestone-notices/{noticeId}/dismiss:
    post:
      tags: [Retention]
      summary: 关闭里程碑弹窗
      parameters:
        - $ref: "#/components/parameters/NoticeId"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEmptyResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/settings:
    get:
      tags: [Settings]
      summary: 获取用户设置
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiUserSettingsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      tags: [Settings]
      summary: 保存用户设置
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserSettings"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiUserSettingsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    EntryId:
      in: path
      name: entryId
      required: true
      schema:
        type: string
        format: uuid
    TaskId:
      in: path
      name: taskId
      required: true
      schema:
        type: string
        format: uuid
    ReportId:
      in: path
      name: reportId
      required: true
      schema:
        type: string
        format: uuid
    NoticeId:
      in: path
      name: noticeId
      required: true
      schema:
        type: string
        format: uuid
  responses:
    BadRequest:
      description: 参数错误
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          example:
            code: 40001
            message: 参数错误
            data: null
    Unauthorized:
      description: 未登录或 token 无效
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          example:
            code: 40101
            message: 未登录或登录已过期
            data: null
    Forbidden:
      description: 无权限访问资源
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          example:
            code: 40301
            message: 无权限访问该资源
            data: null
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          example:
            code: 40401
            message: 资源不存在
            data: null
    Conflict:
      description: 状态冲突
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          example:
            code: 40901
            message: 当前状态不允许执行该操作
            data: null
    InternalServerError:
      description: 服务端错误
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          example:
            code: 50001
            message: 服务端错误
            data: null
    AiServiceError:
      description: AI 服务调用失败
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          example:
            code: 50010
            message: AI 服务暂时不可用
            data: null
  schemas:
    ApiErrorResponse:
      type: object
      required: [code, message, data]
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          nullable: true
    ApiEmptyResponse:
      type: object
