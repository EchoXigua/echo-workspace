          type: string
          format: date-time
    SyncLocalDietEntriesResult:
      type: object
      required: [importedEntries, skippedClientLocalIds, failedItems, snapshots]
      properties:
        importedEntries:
          type: array
          description: 本次新导入或已幂等匹配到的服务端饮食记录。
          items:
            $ref: "#/components/schemas/FoodEntry"
        skippedClientLocalIds:
          type: array
          description: 已存在且无需重复导入的本地记录 ID。
          items:
            type: string
