            $ref: "#/components/schemas/FoodItem"
        createdAt:
          type: string
          format: date-time
    FoodEntrySummary:
      type: object
      required: [id, mealType, totalCaloriesKcal, itemNames]
      properties:
        id:
          type: string
          format: uuid
        mealType:
          $ref: "#/components/schemas/MealType"
        totalCaloriesKcal:
          type: integer
        itemNames:
          type: array
          items:
            type: string
    FoodEntrySaveResult:
      type: object
      required: [entry, today]
      properties:
        entry:
          $ref: "#/components/schemas/FoodEntry"
        today:
          $ref: "#/components/schemas/DailyNutritionSnapshot"
    FoodItem:
      type: object
      required: [id, name, userEdited]
      properties:
        id:
          type: string
          format: uuid
        foodId:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
        quantityText:
          type: string
          nullable: true
        weightG:
          type: number
          nullable: true
        caloriesKcal:
          type: integer
          nullable: true
        proteinG:
          type: number
          nullable: true
        fatG:
          type: number
          nullable: true
        carbsG:
          type: number
          nullable: true
        confidence:
          type: number
          nullable: true
        userEdited:
          type: boolean
        nutritionSource:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/NutritionSource"
    SaveWeightEntryRequest:
      type: object
      required: [recordDate, weightKg]
      properties:
        recordDate:
          type: string
          format: date
        weightKg:
          type: number
          minimum: 20
          maximum: 300
        note:
          type: string
          maxLength: 500
          nullable: true
    WeightEntry:
      allOf:
        - $ref: "#/components/schemas/SaveWeightEntryRequest"
        - type: object
          required: [id, createdAt]
          properties:
            id:
              type: string
              format: uuid
            clientLocalId:
              type: string
              format: uuid
              nullable: true
            createdAt:
              type: string
              format: date-time
    WeightEntrySaveResult:
      type: object
      required: [entry, today]
      properties:
        entry:
          $ref: "#/components/schemas/WeightEntry"
        today:
          $ref: "#/components/schemas/DailyNutritionSnapshot"
    WeightTrend:
      type: object
      required: [windowDays, direction, points]
      properties:
        windowDays:
          type: integer
        targetWeightKg:
          type: number
          nullable: true
        startWeightKg:
          type: number
          nullable: true
        latestWeightKg:
          type: number
          nullable: true
        changeKg:
          type: number
          nullable: true
        direction:
          $ref: "#/components/schemas/WeightTrendDirection"
        points:
          type: array
          items:
            $ref: "#/components/schemas/WeightTrendPoint"
    WeightTrendPoint:
      type: object
      required: [date, weightKg, isToday]
      properties:
        date:
          type: string
          format: date
        weightKg:
          type: number
        isToday:
          type: boolean
    DailyNutritionSnapshot:
      type: object
      required:
        - date
        - calorieTargetKcal
        - caloriesKcal
        - remainingCaloriesKcal
        - proteinG
        - fatG
        - carbsG
        - foodEntryCount
      properties:
        date:
          type: string
          format: date
        calorieTargetKcal:
          type: integer
        caloriesKcal:
          type: integer
        remainingCaloriesKcal:
          type: integer
        proteinG:
          type: number
        fatG:
          type: number
        carbsG:
          type: number
        foodEntryCount:
          type: integer
        weightKg:
          type: number
          nullable: true
    GenerateDailyReportRequest:
      type: object
      properties:
        date:
          type: string
          format: date
    DailyReport:
      type: object
      required: [id, reportDate, status]
      properties:
        id:
          type: string
          format: uuid
        reportDate:
          type: string
          format: date
        score:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
        summary:
          type: string
          nullable: true
        problem:
          type: string
          nullable: true
        suggestion:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, generated, viewed, failed]
        generatedAt:
          type: string
          format: date-time
          nullable: true
        viewedAt:
          type: string
          format: date-time
          nullable: true
    Streak:
      type: object
      required: [currentDays, longestDays, milestones]
      properties:
        currentDays:
          type: integer
        longestDays:
          type: integer
        lastActiveDate:
          type: string
          format: date
          nullable: true
        milestones:
          type: array
          items:
            $ref: "#/components/schemas/StreakMilestone"
    StreakMilestone:
      type: object
      required: [days, achieved]
      properties:
        days:
          type: integer
          enum: [3, 7, 12, 30, 100]
        achieved:
          type: boolean
        achievedAt:
          type: string
          format: date-time
          nullable: true
    RetentionNotice:
      type: object
      required: [id, type, title, currentValue, triggeredAt]
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [streak]
        title:
          type: string
        message:
          type: string
          nullable: true
        currentValue:
          type: integer
        previousValue:
          type: integer
          nullable: true
        nextValue:
          type: integer
          nullable: true
        triggeredAt:
          type: string
          format: date-time
    UserSettings:
      type: object
      properties:
        mealReminderEnabled:
          type: boolean
        mealReminderTimes:
          type: array
          maxItems: 8
          items:
            type: string
            pattern: "^\\d{2}:\\d{2}$"
          example: ["08:30", "12:30", "18:30"]
        milestoneNoticeEnabled:
          type: boolean
        autoSyncEnabled:
          type: boolean
    MealType:
      type: string
      enum: [breakfast, lunch, dinner, snack]
    GoalType:
      type: string
      enum: [lose_weight, gain_weight, maintain]
    WeightTrendDirection:
      type: string
      enum: [decreasing, increasing, flat]
    NutritionSource:
      type: string
      enum: [food_db, ai_estimated, user_confirmed, user_override]
    FoodCatalogSource:
      type: string
      enum: [curated, usda, open_food_facts, vendor, ai_estimated]
