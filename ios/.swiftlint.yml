disabled_rules:
  - trailing_whitespace

opt_in_rules:
  - empty_count
  - explicit_init
  - fatal_error_message
  - first_where
  - force_unwrapping
  - implicitly_unwrapped_optional
  - sorted_imports
  - toggle_bool
  - unneeded_parentheses_in_closure_argument

included:
  - LeanMate

excluded:
  - LeanMate/Resources
  - LeanMate/PreviewSupport/Generated

line_length:
  warning: 120
  error: 160
  ignores_comments: true
  ignores_urls: true

function_body_length:
  warning: 60
  error: 100

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 800

cyclomatic_complexity:
  warning: 10
  error: 20

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    - url
    - api

nesting:
  type_level:
    warning: 2

reporter: xcode
